<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABDULLAH PROJECT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 18px;
}

/* APP */
.app {
    width: 100%;
    min-height: 100vh;
}

/* GLASS CARD */
.glass {
    margin: 10px;
    padding: 15px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);

    /* Animation */
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* FORM AREA */
.form-box {
    width: 100%;
}

/* IFRAME */
iframe {
    width: 100%;
    height: 1100px;
    border: none;
    border-radius: 15px;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 14px;
    width: 100%;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    font-weight: bold;
    font-size: 15px;
}

/* RESULT */
.hidden {
    display: none;
}

.april {
    font-size: 40px;
    color: red;
    animation: pop 1s infinite;
}

@keyframes pop {
    50% { transform: scale(1.2); }
}

img {
    width: 150px;
    margin-top: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- LAUGH SOUND -->
<audio id="laugh" src="https://www.myinstants.com/media/sounds/evil-laugh.mp3"></audio>

<div class="app">

<!-- HEADER -->
<div class="header">ABDULLAH PROJECT</div>

<!-- FORM -->
<div class="glass">
    <p style="text-align:center;">Student Intelligence Analysis System</p>

    <div class="form-box">
        <iframe 
        src="https://docs.google.com/forms/d/e/1FAIpQLSfrwxj1L1OexuwgjrxPmITUo7i1sHya1lTzq3oyQYZGTf9rbg/viewform?embedded=true">
        </iframe>
    </div>

    <button onclick="goToResult()">🔵 Continue to View Analysis Result</button>
</div>

<!-- RESULT -->
<div id="result" class="glass hidden">
    <h3>🎉 RESULT READY 🎉</h3>

    <button onclick="showPrank()">View Result</button>

    <div id="final" class="hidden">
        <h2>🥇 BEST SMILE AWARD 2026 🥇</h2>
        <h1 class="april">APRIL FOOL 😂</h1>

        <!-- FIXED IMAGE -->
        <img src="https://i.imgur.com/231Gv7a.jpeg">

        <p style="margin-top:10px;">Thank you Miss for trying my project ❤️</p>

        <h3 id="counter">People Fooled: 1000</h3>
    </div>
</div>

</div>

<script>
// Continue button
function goToResult(){
    document.getElementById("result").classList.remove("hidden");

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });
}

// Prank reveal
function showPrank(){
    document.getElementById("final").classList.remove("hidden");

    // Play sound
    document.getElementById("laugh").play();

    let count = 1000;
    setInterval(()=>{
        count++;
        document.getElementById("counter").innerText = "People Fooled: " + count;
    }, 500);
}
</script>

</body>
</html>
