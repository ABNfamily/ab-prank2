<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABDULLAH PROJECT</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 18px;
}

/* GLASS */
.glass {
    margin: 10px;
    padding: 15px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* FORM */
iframe {
    width: 100%;
    height: 1100px;
    border: none;
    border-radius: 15px;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 14px;
    width: 100%;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    font-weight: bold;
    font-size: 15px;
}

/* RESULT */
.hidden { display:none; }

.april {
    font-size: 42px;
    color: red;
    animation: pop 1s infinite;
}

@keyframes pop {
    50% { transform: scale(1.2); }
}

img {
    width: 150px;
    margin-top: 10px;
    border-radius: 10px;
}

/* FLASH */
.flash {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
}

.flash.active {
    animation: flashAnim 0.4s;
}

@keyframes flashAnim {
    0% {opacity:1;}
    100% {opacity:0;}
}

/* SHAKE */
.shake {
    animation: shakeAnim 0.4s;
}

@keyframes shakeAnim {
    0% { transform: translate(5px, 5px); }
    25% { transform: translate(-5px, 0px); }
    50% { transform: translate(5px, -5px); }
    75% { transform: translate(-5px, 5px); }
    100% { transform: translate(0px, 0px); }
}
</style>

</head>

<body>

<!-- FLASH -->
<div id="flash" class="flash"></div>

<!-- SOUND -->
<audio id="laugh" preload="auto">
  <source src="https://abnfamily.github.io/ab-prank2/baby-laughing-meme.mp3" type="audio/mpeg">
</audio>

<div class="header">ABDULLAH PROJECT</div>

<div class="glass">
    <p style="text-align:center;">Student Intelligence Analysis System</p>

    <iframe 
    src="https://docs.google.com/forms/d/e/1FAIpQLSfrwxj1L1OexuwgjrxPmITUo7i1sHya1lTzq3oyQYZGTf9rbg/viewform?embedded=true">
    </iframe>

    <button onclick="goToResult()">🔵 Continue to View Analysis Result</button>
</div>

<div id="result" class="glass hidden">
    <h3>🎉 RESULT READY 🎉</h3>

    <button onclick="showPrank()">View Result</button>

    <div id="final" class="hidden">
        <h2>🥇 BEST SMILE AWARD 2026 🥇</h2>
        <h1 class="april">APRIL FOOL 😂</h1>

        <img src="https://i.imgur.com/231Gv7a.jpeg">

        <p style="margin-top:10px;">Thank you Miss for trying my project ❤️</p>

        <h3 id="counter">People Fooled: 1000</h3>
    </div>
</div>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function goToResult(){
    document.getElementById("result").classList.remove("hidden");

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });
}

function showPrank(){
    document.getElementById("final").classList.remove("hidden");

    // SOUND
    document.getElementById("laugh").play();

    // FLASH
    let flash = document.getElementById("flash");
    flash.classList.add("active");

    // SHAKE
    document.body.classList.add("shake");
    setTimeout(()=> document.body.classList.remove("shake"), 400);

    // CONFETTI
    confetti({
        particleCount: 180,
        spread: 120,
        origin: { y: 0.6 }
    });

    // COUNTER
    let count = 1000;
    setInterval(()=>{
        count++;
        document.getElementById("counter").innerText = "People Fooled: " + count;
    }, 500);
}
</script>

</body>
</html>
